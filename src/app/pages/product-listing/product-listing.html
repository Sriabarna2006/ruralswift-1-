<!-- Header -->
<nav class="navbar navbar-expand-lg product-header sticky-top">
  <div class="container">

    <a routerLink="/home" class="btn btn-light rounded-circle">
      <i class="bi bi-arrow-left"></i>
    </a>

    <h4 class="text-white fw-bold ms-3 mb-0">
      Products
    </h4>

    <div class="ms-auto">

      <select
        class="form-select"
        (change)="sortProducts($event)">

        <option value="">Sort By</option>
        <option value="low">Price : Low → High</option>
        <option value="high">Price : High → Low</option>
        <option value="best">Best Rated</option>

      </select>

    </div>

  </div>
</nav>

<!-- Categories -->

<section class="container py-4">

  <div class="d-flex flex-wrap gap-2">

    <button
      *ngFor="let category of categories"
      class="btn"
      [class.btn-primary]="selectedCategory==category"
      [class.btn-outline-primary]="selectedCategory!=category"
      (click)="filterCategory(category)">

      {{category}}

    </button>

  </div>

</section>

<!-- Products -->

<section class="container pb-5">

  <div class="row g-4">

    <div
      class="col-lg-3 col-md-4 col-sm-6"
      *ngFor="let product of filteredProducts">

      <div class="card product-card shadow-sm">

        <span class="badge bg-danger offer">

          {{product.offer}}

        </span>

        <img
          [src]="product.image"
          class="card-img-top"
          [alt]="product.name">

        <div class="card-body">

          <small class="text-primary">

            {{product.category}}

          </small>

          <h5 class="fw-bold mt-2">

            {{product.name}}

          </h5>

          <div class="text-warning mb-2">

            ★★★★★

          </div>

          <div>

            <span class="fw-bold text-success fs-4">

              ₹{{product.price}}

            </span>

            <span
              class="text-muted text-decoration-line-through ms-2">

              ₹{{product.oldPrice}}

            </span>

          </div>

          <a
            class="btn btn-success w-100 mt-3"
            [routerLink]="['/product-details',product.id]">

            View Details

          </a>

        </div>

      </div>

    </div>

  </div>

</section>
