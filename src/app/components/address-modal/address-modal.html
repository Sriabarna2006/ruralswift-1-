@if (ui.addressModalOpen()) {
  <div class="modal-overlay" (click)="closeModal()">
    <div class="modal-container" (click)="$event.stopPropagation()">
      
      <div class="modal-header">
        <h2 class="modal-title">{{ ui.addressModalTitle() }}</h2>
        <button class="btn-close" (click)="closeModal()" aria-label="Close address modal">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" 
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="modal-body">
        <form (submit)="saveAddress($event)" class="address-form" id="address-form">
          
          <div class="form-row">
            <div class="form-group">
              <label for="addr-fullname">Full Name *</label>
              <input type="text" id="addr-fullname" name="full_name" [(ngModel)]="formData.full_name" required placeholder="Enter full name" />
            </div>
            <div class="form-group">
              <label for="addr-phone">Phone Number *</label>
              <input type="tel" id="addr-phone" name="phone" [(ngModel)]="formData.phone" required placeholder="10-digit mobile number" />
            </div>
          </div>

          <div class="form-group">
            <label for="addr-line1">Address Line 1 *</label>
            <input type="text" id="addr-line1" name="address_line1" [(ngModel)]="formData.address_line1" required placeholder="House No., Building, Street, Area" />
          </div>

          <div class="form-group">
            <label for="addr-line2">Address Line 2</label>
            <input type="text" id="addr-line2" name="address_line2" [(ngModel)]="formData.address_line2" placeholder="Locality, Landmark (Optional)" />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="addr-city">City/Town *</label>
              <input type="text" id="addr-city" name="city" [(ngModel)]="formData.city" required placeholder="e.g. Mumbai" />
            </div>
            <div class="form-group">
              <label for="addr-state">State *</label>
              <input type="text" id="addr-state" name="state" [(ngModel)]="formData.state" required placeholder="e.g. Maharashtra" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="addr-pincode">Pincode *</label>
              <input type="text" id="addr-pincode" name="pincode" [(ngModel)]="formData.pincode" required placeholder="6-digit pincode" />
            </div>
            <div class="form-group">
              <label for="addr-label">Address Type</label>
              <select id="addr-label" name="label" [(ngModel)]="formData.label">
                <option value="Home">Home</option>
                <option value="Work">Work</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>

          <div class="form-group checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" name="is_default" [(ngModel)]="formData.is_default" />
              Make this my default address
            </label>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn-cancel" (click)="closeModal()">Cancel</button>
            <button type="submit" class="btn-save" [disabled]="isSaving()">
              @if (isSaving()) {
                Saving...
              } @else {
                Save Address
              }
            </button>
          </div>
        </form>
      </div>

    </div>
  </div>
}
